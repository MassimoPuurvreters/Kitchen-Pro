<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuken App FIXED</title>

<style>
body { font-family: system-ui; background:#121212; color:white; margin:0; }
header { padding:15px; text-align:center; background:#1e1e1e; }

.block { background:#1f1f1f; padding:12px; margin:10px; border-radius:12px; }

.row { display:flex; gap:6px; margin-top:6px; align-items:center; }

input, select, textarea {
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#333;
  color:white;
}

textarea { height:80px; }

button {
  padding:8px;
  border:none;
  border-radius:8px;

  color:white;
}

.danger { background:#ff3b30; }

.cat { margin-top:10px; color:#aaa; }

.done { text-decoration:line-through; opacity:0.5; }

.topbar {
  display:flex;
  gap:5px;
  justify-content:center;
  margin:10px;
}
</style>
</head>

<body>

<header>🍳 Keuken App</header>

<div class="topbar">
  <button onclick="downloadData()">⬇️ Download</button>
  <input type="file" onchange="uploadData(event)">
</div>

<div class="block">
👥 Personen:
<input type="number" id="people" value="4" onchange="render()">
</div>

<div class="block">
<h3>🤖 AI import</h3>
<textarea id="input" placeholder="2 ui&#10;kip 150 g&#10;melk 200 ml"></textarea>
<button onclick="importRecipe()">Importeer</button>
</div>

<div class="block">
<button onclick="addRecipe()">+ Nieuw gerecht</button>
<div id="recipes"></div>
</div>

<div class="block">
<h3>🛒 Boodschappen</h3>
<div id="list"></div>
</div>

<script>

/* DATA */
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");
let checked = JSON.parse(localStorage.getItem("checked") || "{}");

/* SAVE */
function save(){
  localStorage.setItem("recipes", JSON.stringify(recipes));
  localStorage.setItem("checked", JSON.stringify(checked));
}

/* ✅ FIXED DOWNLOAD */
function downloadData(){
  let data = JSON.stringify({recipes, checked});
  let blob = new Blob([data], {type:"application/json"});

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "keuken_app.json";
  a.click();
}

/* ✅ FIXED UPLOAD */
function uploadData(e){

  let file = e.target.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = function(evt){
    try{
      let data = JSON.parse(evt.target.result);
      recipes = data.recipes || [];
      checked = data.checked || {};
      save();
      render();
    }catch(err){
      alert("Bestand ongeldig");
    }
  };

  reader.readAsText(file);
}

/* ADD */
function addRecipe(){
  recipes.push({name:"Nieuw gerecht", items:[]});
  save(); render();
}

/* DELETE */
function removeRecipe(r){
  recipes.splice(r,1);
  save(); render();
}

/* INGREDIENT */
function addItem(r){
  recipes[r].items.push({name:"", amount:0, unit:"g", cat:"overig"});
  save(); render();
}

function removeItem(r,i){
  recipes[r].items.splice(i,1);
  save(); render();
}

/* ✅ SUPER STABIELE IMPORT */
function simpleParse(text){

  let lines = text.split("\n");
  let items = [];

  lines.forEach(line => {

    if(!line.trim()) return;

    let amount = 1;
    let unit = "stuks";
    let name = line;

    // pak eerste getal
    let num = line.match(/\d+/);
    if(num){
      amount = Number(num[0]);
    }

    // unit check
    if(line.includes("g")) unit="g";
    if(line.includes("kg")) unit="kg";
    if(line.includes("ml")) unit="ml";
    if(line.includes("l")) unit="l";

    // naam schonen
    name = line
      .replace(/\d+/,"")
      .replace(unit,"")
      .trim();

    if(!name) name="onbekend";

    // categorie simpel
    let cat="overig";
    if(name.includes("ui")||name.includes("tomaat")) cat="groente";
    if(name.includes("kip")) cat="vlees";
    if(name.includes("melk")||name.includes("kaas")) cat="zuivel";

    items.push({name, amount, unit, cat});
  });

  return items;
}

/* IMPORT */
function importRecipe(){

  let text = document.getElementById("input").value;

  if(!text){
    alert("Plak eerst een recept");
    return;
  }

  let name = prompt("Naam recept:") || "Nieuw recept";

  let items = simpleParse(text);

  recipes.push({name, items});

  document.getElementById("input").value="";

  save(); render();
}

/* CALC */
function calc(a){
  let p = Number(document.getElementById("people").value) || 0;
  return a * p;
}

/* UNIT */
function smart(val,unit){
  if(unit==="g" && val>=1000) return (val/1000).toFixed(1)+" kg";
  if(unit==="ml" && val>=1000) return (val/1000).toFixed(1)+" l";
  return val+" "+unit;
}

/* LIST */
function buildList(){

  let out={};

  recipes.forEach(r=>{
    r.items.forEach(i=>{
      if(!out[i.cat]) out[i.cat]={};

      let key=i.name+"_"+i.unit;
      let val=calc(i.amount);

      out[i.cat][key]=(out[i.cat][key]||0)+val;
    });
  });

  return out;
}

/* CHECK */
function toggle(k){
  checked[k]=!checked[k];
  save(); render();
}

/* RENDER */
function render(){

  let html="";

  recipes.forEach((rec,r)=>{

    html+=`
    <div class="block">
      <div class="row">
