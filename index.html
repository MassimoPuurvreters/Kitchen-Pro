<!DOCTYPE html>
<html>
<head>

</head>
<body>

<header>🍳 Keuken AI App</header>

<div class="container">

<div class="card">
👥 Personen:
<input type="number" id="people" value="4" onchange="render()">
</div>

<div class="card">
<h3>🤖 Slim importeren</h3>
<textarea id="input" placeholder="2 ui&#10;kip 150 g&#10;melk 200 ml"></textarea>

<button onclick="importRecipe()">✨ AI import</button>
</div>

<div class="card">
<button onclick="addRecipe()">➕ Nieuw gerecht</button>
<div id="recipes"></div>
</div>

<div class="card">
<h3>🛒 Boodschappen</h3>
<div id="list"></div>
</div>

</div>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let checked = JSON.parse(localStorage.getItem("checked")||"{}");

/* SAVE */
function save(){
  localStorage.setItem("recipes", JSON.stringify(recipes));
  localStorage.setItem("checked", JSON.stringify(checked));
}

/* AI CATEGORIE */
function detectCategory(name){

  name = name.toLowerCase();

  if(/ui|tomaat|paprika|komkommer/.test(name)) return "groente";
  if(/kip|rund|gehakt|vlees/.test(name)) return "vlees";
  if(/melk|kaas|yoghurt|room/.test(name)) return "zuivel";

  return "overig";
}

/* AI PARSER (robuust) */
function aiParse(text){

  let lines = text.split("\n");
  let items = [];

  lines.forEach(line=>{

    line = line.trim();
    if(!line) return;

    let words = line.split(" ");

    let amount = 1;
    let unit = "stuks";
    let name = "";

    words.forEach((w,i)=>{

      if(!isNaN(w)){
        amount = Number(w);

        let next = words[i+1];
        if(next && ["g","kg","ml","l","stuks"].includes(next)){
          unit = next;
        }

      } else {
        name += w + " ";
      }
    });

    name = name.trim() || "onbekend";

    items.push({
      name: name,
      amount: amount,
      unit: unit,
      cat: detectCategory(name)
    });

  });

  return items;
}

/* IMPORT */
function importRecipe(){

  let text = document.getElementById("input").value;
  if(!text) return alert("Plak eerst tekst");

  let name = prompt("Naam gerecht:") || "Nieuw gerecht";

  let items = aiParse(text);

  recipes.push({name, items});

  document.getElementById("input").value = "";

  save();
  render();
}

/* ADD */
function addRecipe(){
  recipes.push({name:"Nieuw gerecht", items:[]});
  save();
  render();
}

function addItem(r){
  recipes[r].items.push({
    name:"",
    amount:0,
    unit:"g",
    cat:"overig"
  });
  save();
  render();
}

function removeItem(r,i){
  recipes[r].items.splice(i,1);
  save();
  render();
}

function removeRecipe(r){
  recipes.splice(r,1);
  save();
  render();
}

/* CALC */
function calc(a){
  let p = Number(document.getElementById("people").value) || 0;
  return a * p;
}

/* SMART UNIT */
function smart(val,unit){
  if(unit==="g" && val>=1000) return (val/1000).toFixed(1)+" kg";
  if(unit==="ml" && val>=1000) return (val/1000).toFixed(1)+" l";
  return val+" "+unit;
}

/* LIST */
function buildList(){

  let out = {};

  recipes.forEach(r=>{
    r.items.forEach(i=>{

      if(!i.name) return;

      if(!out[i.cat]) out[i.cat] = {};

      let key = i.name+"_"+i.unit;
      let val = calc(i.amount);

      out[i.cat][key] = (out[i.cat][key] || 0) + val;
    });
  });

  return out;
}

/* CHECK */
function toggle(k){
  checked[k]=!checked[k];
  save();
  render();
}

/* RENDER */
function render(){

  let html = "";

  recipes.forEach((rec,r)=>{

    html += `
    <div class="card">
      <div class="row">
