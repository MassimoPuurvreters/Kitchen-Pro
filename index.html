<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuken App v2</title>

<style>
body { font-family: Arial; background:#111; color:white; margin:0; }
header { padding:15px; background:#222; text-align:center; }
.block { padding:10px; margin:10px; background:#1f1f1f; border-radius:10px; }
input { margin:3px; padding:5px; }
button { padding:5px 8px; margin:3px; }
</style>
</head>

<body>

<header>🍳 KEUKEN APP</header>

<div class="block">
Personen:
<input type="number" id="people" value="4">
<button onclick="update()">update</button>
</div>

<div class="block">
<button onclick="addRecipe()">+ nieuw gerecht</button>
<div id="recipes"></div>
</div>

<div class="block">
<h3>BOODSCHAPPEN</h3>
<div id="list"></div>
</div>

<script>

let recipes = [];

/* nieuw gerecht */
function addRecipe(){
  recipes.push({ name:"Nieuw gerecht", items: [] });
  update();
}

/* ingrediënt toevoegen */
function addItem(r){
  let name = prompt("naam:");
  let amount = Number(prompt("per persoon:"));
  let unit = prompt("eenheid:");

  recipes[r].items.push({name, amount, unit});
  update();
}

/* verwijderen */
function removeItem(r,i){
  recipes[r].items.splice(i,1);
  update();
}

function removeRecipe(r){
  recipes.splice(r,1);
  update();
}

/* update */
function update(){

  let p = Number(document.getElementById("people").value);
  let html = "";
  let list = {};

  recipes.forEach((rec,r)=>{

    html += `
      <div class="block">
        <input value="${rec.name}" onchange="recipes[${r}].name=this.value">
        <button onclick="removeRecipe(${r})">🗑</button>
        <br>
        <button onclick="addItem(${r})">+ ingrediënt</button>
    `;

    rec.items.forEach((item,i)=>{

      let total = item.amount * p;

      html += `
        <div>
          ${item.name}: ${total} ${item.unit}
          <button onclick="removeItem(${r},${i})">❌</button>
        </div>
      `;

      let key = item.name + " ("+item.unit+")";
      list[key] = (list[key] || 0) + total;
    });

    html += `</div>`;
  });

  document.getElementById("recipes").innerHTML = html;

  /* lijst */
  let listHTML = "";
  for(let k in list){
    listHTML += `<div>${k}: ${list[k]}</div>`;
  }

  document.getElementById("list").innerHTML = listHTML;
}

</script>

</body>
</html>
