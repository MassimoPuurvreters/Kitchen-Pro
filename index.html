<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Keuken App Pro</title>

<style>
body {
  margin:0;
  
  font-family:-apple-system, system-ui;
  background:#000;
  color:white;
}

header {
  padding:16px;
  text-align:center;
  background:#1c1c1e;
  font-size:18px;
  font-weight:600;
}

.card {
  background:#1c1c1e;
  margin:12px;
  padding:15px;
  border-radius:16px;
}

input {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:12px;
  background:#0a84ff;
  color:white;
}

.delete {
  background:#ff453a;
}

h3 {
  margin:8px 0;
}

/* Kookmodus */
#cook {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  padding:20px;
}

#cookText {
  font-size:28px;
  text-align:center;
  margin-top:120px;
}
</style>

</head>

<body>

<header>🍳 Keuken App</header>

<!-- INPUT -->
<div class="card">
<input id="input" placeholder="bijv: kip pasta gezond">
<button onclick="makeRecipe()">✨ Maak recept</button>
</div>

<!-- PREVIEW -->
<div id="preview" class="card"></div>

<div class="card">
<button onclick="saveRecipe()">✅ Opslaan</button>
</div>

<!-- RECEPTEN -->
<div id="recipes"></div>

<!-- BOODSCHAPPEN -->
<div class="card">
<h3>🛒 Boodschappenlijst</h3>
<div id="list"></div>
<button onclick="printList()">🖨️ Print</button>
</div>

<!-- KOOKMODUS -->
<div id="cook">
<div id="cookText"></div>

<div style="position:absolute; bottom:20px; width:100%;">
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
<button onclick="closeCook()">❌ Stop</button>
</div>
</div>

<script>

/* DATA MET OPSLAG */
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");
let current = null;

let steps = [];
let stepIndex = 0;

/* OPSLAAN */
function saveData(){
  localStorage.setItem("recipes", JSON.stringify(recipes));
}

/* AI RECEPT */
function makeRecipe(){

  let text = document.getElementById("input").value.toLowerCase();

  if(!text){
    alert("Typ iets");
    return;
  }

  let items = [];
  let s = [];

  if(text.includes("kip")){
    items.push("kip");
    s.push("Snijd kip");
    s.push("Bak kip");
  }

  if(text.includes("pasta")){
    items.push("pasta");
    s.push("Kook pasta");
  }

  if(text.includes("rijst")){
    items.push("rijst");
    s.push("Kook rijst");
  }

  if(text.includes("gezond")){
    items.push("groenten");
    s.push("Voeg groenten toe");
  }

  if(items.length === 0){
    items.push("ingrediënt");
    s.push("Bereid naar smaak");
  }

  s.push("Meng alles");

  current = {
    name: text,
    items: items,
    steps: s
  };

  document.getElementById("preview").innerHTML = `
    <h3>${text}</h3>

    <b>Ingrediënten</b><br>
    ${items.join("<br>")}

    <br><br>

    <b>Stappen</b><br>
    ${s.map((x,i)=> (i+1)+". "+x).join("<br>")}
  `;
}

/* OPSLAAN */
function saveRecipe(){

  if(!current){
    alert("Maak eerst een recept");
    return;
  }

  recipes.push(current);
  saveData();

  document.getElementById("preview").innerHTML = "";
  document.getElementById("input").value = "";

  render();
}

/* DELETE */
function remove(i){
  recipes.splice(i,1);
  saveData();
  render();
}

/* BOODSCHAPPEN */
function buildList(){

  let list = {};

  recipes.forEach(r=>{
    r.items.forEach(i=>{
      list[i] = (list[i] || 0) + 1;
    });
  });

  return list;
}

/* PRINT */
function printList(){

  let list = buildList();
  let text = "BOODSCHAPPENLIJST\\n\\n";

  for(let k in list){
    text += "- " + k + " x" + list[k] + "\\n";
  }

  let w = window.open("");
  w.document.write("<pre>"+text+"</pre>");
  w.print();
}

/* RENDER */
function render(){

  let html = "";
  let list = buildList();

  recipes.forEach((r,i)=>{

    html += `
    <div class="card">

      <h3>${r.name}</h3>

      <b>Ingrediënten</b><br>
      ${r.items.join("<br>")}

      <br><br>

      <b>Stappen</b><br>
      ${r.steps.map((s,j)=> (j+1)+". "+s).join("<br>")}

      <button onclick="cook(${i})">👨‍🍳 Start koken</button>
      <button class="delete" onclick="remove(${i})">🗑 Verwijder</button>

    </div>
    `;
  });

  document.getElementById("recipes").innerHTML = html;

  let listHTML = "";
  for(let k in list){
    listHTML += `<div>- ${k} x${list[k]}</div>`;
  }

  document.getElementById("list").innerHTML = listHTML;
}

/* KOOKMODUS */
function cook(i){
  steps = recipes[i].steps;
  stepIndex = 0;
  document.getElementById("cook").style.display = "block";
  showStep();
}

function showStep(){
  document.getElementById("cookText").innerText =
    "Stap " + (stepIndex+1) + "\\n\\n" + steps[stepIndex];
}

function next(){
  if(stepIndex < steps.length-1){
    stepIndex++;
    showStep();
  }
}

function prev(){
  if(stepIndex > 0){
    stepIndex--;
    showStep();
  }
}

function closeCook(){
  document.getElementById("cook").style.display = "none";
}

/* START */
render();

</script>

</body>
</html>
