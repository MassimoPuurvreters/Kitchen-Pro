<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Keuken App</title>

<style>
body {font-family:Arial;margin:0;background:#111;color:white;}
header {padding:15px;text-align:center;background:#222;}
.block {background:#1f1f1f;margin:10px;padding:10px;border-radius:8px;}
button {padding:6px 10px;margin:3px;}
input {padding:5px;margin:3px;width:100%;}
.big {font-size:24px;text-align:center;margin-top:40px;}
</style>
</head>

<body>

<header>🍳 Keuken App</header>

<div class="block">
<input id="search" placeholder="kip pasta gezond">
<button onclick="generate()">AI recept</button>
</div>

<div id="result" class="block"></div>

<div class="block">
<button onclick="add()">+ opslaan</button>
</div>

<div id="recipes"></div>

<!-- COOK MODE -->
<div id="cook" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;">
  <div id="step" class="big"></div>
  <button onclick="prev()">⬅️</button>
  <button onclick="next()">➡️</button>
  <button onclick="closeCook()">❌</button>
</div>

<script>

let recipes = [];
let currentSteps = [];
let index = 0;

/* ✅ AI GENERATOR (SUPER SIMPEL) */
function generate(){

  let q = document.getElementById("search").value.toLowerCase();
  if(!q) return;

  let items = [];
  let steps = [];

  if(q.includes("kip")){
    items.push("kip 150g");
    steps.push("Snijd de kip");
    steps.push("Bak de kip");
  }

  if(q.includes("pasta")){
    items.push("pasta 100g");
    steps.push("Kook de pasta");
  }

  if(q.includes("rijst")){
    items.push("rijst 100g");
    steps.push("Kook de rijst");
  }

  if(q.includes("gezond")){
    items.push("groenten 100g");
    steps.push("Voeg groenten toe");
  }

  if(items.length === 0){
    items.push("ingrediënt 100g");
    steps.push("Bereid naar smaak");
  }

  steps.push("Meng alles");

  /* opslaan tijdelijk */
  window.temp = {name:q, items, steps};

  /* tonen */
  document.getElementById("result").innerHTML = `
    <h3>${q}</h3>

    <b>Ingrediënten</b>
    <br>${items.join("<br>")}

    <br><br>
    <b>Stappen</b>
    <br>${steps.map((s,i)=> (i+1)+". "+s).join("<br>")}
  `;
}

/* ✅ OPSLAAN */
function add(){

  if(!window.temp){
    alert("maak eerst een recept");
    return;
  }

  recipes.push(window.temp);
  render();
}

/* ✅ RENDER */
function render(){

  let html = "";

  recipes.forEach((r,i)=>{

    html += `
    <div class="block">
      <b>${r.name}</b><br>

      ${r.items.join("<br>")}

      <br><br>
      ${r.steps.map((s,j)=> (j+1)+". "+s).join("<br>")}

      <br>
      <button onclick="cook(${i})">👨‍🍳 koken</button>
    </div>
    `;
  });

  document.getElementById("recipes").innerHTML = html;
}

/* ✅ KOOK MODUS */
function cook(i){
  currentSteps = recipes[i].steps;
  index = 0;
  document.getElementById("cook").style.display = "block";
  show();
}

function show(){
  document.getElementById("step").innerText =
    "Stap " + (index+1) + "\n\n" + currentSteps[index];
}

function next(){
  if(index < currentSteps.length-1){
    index++;
    show();
  }
}

function prev(){
  if(index > 0){
    index--;
    show();
  }
}

function closeCook(){
  document.getElementById("cook").style.display = "none";
}

</script>

</body>
</html>
