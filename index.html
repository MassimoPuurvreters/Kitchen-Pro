<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuken App Pro</title>

<style>
body { font-family: system-ui; background:#121212; color:white; margin:0;}

header { padding:15px; background:#1e1e1e; text-align:center; }

.block {
  background:#1f1f1f;
  padding:12px;
  margin:10px;
  border-radius:12px;
}

.row {
  display:flex;
  gap:5px;
  margin-top:5px;
  align-items:center;
}

input, select {
  flex:1;
  padding:6px;
  background:#333;
  border:none;
  border-radius:6px;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#007aff;
  color:white;
}

.del { background:#ff3b30; }

.cat { margin-top:10px; color:#aaa;}

.done { text-decoration: line-through; opacity:0.5;}

.topbar {
  display:flex;
  gap:5px;
  justify-content:center;
  margin:10px;
}
</style>
</head>

<body>

<header>🍳 Keuken App</header>

<div class="topbar">
  <button onclick="downloadData()">⬇️ Download</button>
  <input type="file" onchange="uploadData(event)">
</div>

<div class="block">
👥 Personen:
<input type="number" id="people" value="4" onchange="saveAndRender()">
</div>

<div class="block">
<button onclick="addRecipe()">+ nieuw gerecht</button>
<div id="recipes"></div>
</div>

<div class="block">
<h3>🛒 Boodschappenlijst</h3>
<div id="list"></div>
</div>

<script>

/* DATA */
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");
let checked = JSON.parse(localStorage.getItem("checked") || "{}");

/* SAVE */
function save(){
  localStorage.setItem("recipes", JSON.stringify(recipes));
  localStorage.setItem("checked", JSON.stringify(checked));
}

function saveAndRender(){
  save();
  render();
}

/* DOWNLOAD */
function downloadData(){
  let data = {recipes, checked};
  let blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  let url = URL.createObjectURL(blob);
  
  let a = document.createElement("a");
  a.href = url;
  a.download = "keuken_app.json";
  a.click();
}

/* UPLOAD */
function uploadData(e){
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(evt){
    let data = JSON.parse(evt.target.result);
    recipes = data.recipes || [];
    checked = data.checked || {};
    saveAndRender();
  };

  reader.readAsText(file);
}

/* RECIPES */
function addRecipe(){
  recipes.push({name:"Nieuw gerecht", items:[]});
  saveAndRender();
}

function addItem(r){
  recipes[r].items.push({
    name:"",
    amount:0,
    unit:"g",
    cat:"overig"
  });
  saveAndRender();
}

function removeItem(r,i){
  recipes[r].items.splice(i,1);
  saveAndRender();
}

function removeRecipe(r){
  recipes.splice(r,1);
  saveAndRender();
}

/* CALC */
function calc(a){
  let p = Number(document.getElementById("people").value) || 0;
  return a * p;
}

/* SMART UNIT */
function smartUnit(val, unit){

  if(unit==="g" && val>=1000){
    return (val/1000).toFixed(1)+" kg";
  }

  if(unit==="ml" && val>=1000){
    return (val/1000).toFixed(1)+" l";
  }

  return val+" "+unit;
}

/* LIST */
function buildList(){

  let out = {};

  recipes.forEach(r=>{
    r.items.forEach(i=>{
      if(!i.name) return;

      if(!out[i.cat]) out[i.cat] = {};

      let key = i.name+"_"+i.unit;
      let val = calc(Number(i.amount));

      out[i.cat][key] = (out[i.cat][key] || 0) + val;
    });
  });

  return out;
}

/* CHECK */
function toggle(k){
  checked[k] = !checked[k];
  saveAndRender();
}

/* UI */
function render(){

  let html = "";

  recipes.forEach((rec,r)=>{

    html += `
    <div class="block">
      
      <div class="row">
        <input value="${rec.name}"
        onchange="recipes[${r}].name=this.value;save()">

        <button class="del" onclick="removeRecipe(${r})">🗑</button>
      </div>

      <button onclick="addItem(${r})">+ ingrediënt</button>
    `;

    rec.items.forEach((item,i)=>{

      let total = calc(item.amount);

      html += `
      <div class="row">

        <input placeholder="naam"
        value="${item.name}"
        onchange="recipes[${r}].items[${i}].name=this.value;save()">

        <input type="number"
        value="${item.amount}"
        onchange="recipes[${r}].items[${i}].amount=Number(this.value);save()">

        <input
        value="${item.unit}"
        onchange="recipes[${r}].items[${i}].unit=this.value;save()">

        <select onchange="recipes[${r}].items[${i}].cat=this.value;save()">
          <option ${item.cat=="groente"?"selected":""}>groente</option>
          <option ${item.cat=="vlees"?"selected":""}>vlees</option>
          <option ${item.cat=="zuivel"?"selected":""}>zuivel</option>
          <option ${item.cat=="overig"?"selected":""}>overig</option>
        </select>

        <span>${smartUnit(total, item.unit)}</span>

        <button class="del" onclick="removeItem(${r},${i})">❌</button>

      </div>
      `;
    });

    html += `</div>`;
  });

  document.getElementById("recipes").innerHTML = html;

  /* LIST */
  let list = buildList();
  let listHTML = "";

  for(let cat in list){

    listHTML += `<div class="cat">📂 ${cat}</div>`;

    for(let k in list[cat]){

      let parts = k.split("_");
      let name = parts[0];
      let unit = parts[1];
      let val = list[cat][k];

      let done = checked[k] ? "done" : "";

      listHTML += `
      <div class="${done}">
        <input type="checkbox"
        ${checked[k]?"checked":""}
        onclick="toggle('${k}')">

        ${name}: ${smartUnit(val, unit)}
      </div>
      `;
    }
  }

  document.getElementById("list").innerHTML = listHTML;
}

render();

</script>

</body>
</html>
