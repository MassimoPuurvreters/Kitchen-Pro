<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuken Pro</title>

<style>

/* === APPLE DARK MODE === */
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:#0f1115;
  color:#f5f5f7;
}

/* HEADER */
header {
  padding:16px;
  text-align:center;
  font-weight:600;
  background:#16181d;
  border-bottom:1px solid #222;
}

/* CONTAINER */
.container {
  padding:16px;
  padding-bottom:90px;
}

/* CARD */
.card {
  background:#1c1f26;
  padding:16px;
  border-radius:18px;
  margin-bottom:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

/* INPUTS */
input, select {
  background:#22252c;
  border:1px solid #333;
  color:white;
  border-radius:10px;
  padding:8px;
}

/* BUTTONS */
button {
  background:#0a84ff;
  border:none;
  border-radius:10px;
  padding:6px 10px;
  color:white;
}

button.danger {
  background:#ff453a;
}

/* ROW */
.row {
  display:flex;
  gap:6px;
  align-items:center;
  margin-top:6px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:#16181d;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #222;
}

.nav button {
  background:none;
  font-size:12px;
  color:#888;
}

.active {
  color:#0a84ff;
  font-weight:bold;
}

.big {
  font-weight:bold;
  font-size:18px;
}

</style>
</head>

<body>

<header>🍽️ Keuken Pro (Catering)</header>

<div class="container" id="app"></div>

<div class="nav">
  <button onclick="tab='recipes';render()" id="t1">🍳</button>
  <button onclick="tab='list';render()" id="t2">🛒</button>
  <button onclick="tab='overview';render()" id="t3">📊</button>
</div>

<script>

let tab="recipes";
let people=20; // default groter voor catering
let recipes=[];

/* === ADD RECIPE === */
function addRecipe(){
  recipes.push({
    name:"Nieuw gerecht",
    ings:[]
  });
  render();
}

/* === ADD INGREDIENT === */
function addIng(i){
  recipes[i].ings.push({
    name:"",
    amount:0,
    unit:"g",
    type:"pp"
  });
  render();
}

/* === DELETE === */
function removeIng(i,j){
  recipes[i].ings.splice(j,1);
  render();
}

/* === CALCULATION === */
function calc(ing){
  if(ing.type==="pp"){
    return ing.amount * people;
  } else {
    return ing.amount;
  }
}

/* === TOTAL LIST === */
function getList(){

  let out={};

  recipes.forEach(r=>{
    r.ings.forEach(i=>{
      let key=i.name+" ("+i.unit+")";
      let val=calc(i);

      out[key]=(out[key]||0)+val;
    });
  });

  return out;
}

/* === OVERVIEW (PRO FEATURE) */
function getTotalWeight(){
  let total=0;
  recipes.forEach(r=>{
    r.ings.forEach(i=>{
      total+=calc(i);
    });
  });
  return total;
}

/* === UI === */
function render(){

  let html="";

  if(tab==="recipes"){

    html+=`
    <div class="card">
      👥 Personen:
      <input type="number" value="${people}" onchange="people=this.value;render()">
      <button onclick="addRecipe()">+ gerecht</button>
    </div>
    `;

    recipes.forEach((r,i)=>{

      html+=`
      <div class="card">
        <input value="${r.name}" onchange="recipes[${i}].name=this.value">
        <button class="danger" onclick="recipes.splice(${i},1);render()">🗑</button>
      `;

      r.ings.forEach((ing,j)=>{

        let val=calc(ing);

        html+=`
        <div class="row">

          <input placeholder="ingredient" value="${ing.name}"
          onchange="recipes[${i}].ings[${j}].name=this.value">

          <input type="number" value="${ing.amount}"
          onchange="recipes[${i}].ings[${j}].amount=this.value">

          <select onchange="recipes[${i}].ings[${j}].unit=this.value">
            <option ${ing.unit=="g"?"selected":""}>g</option>
            <option ${ing.unit=="kg"?"selected":""}>kg</option>
            <option ${ing.unit=="ml"?"selected":""}>ml</option>
            <option ${ing.unit=="l"?"selected":""}>l</option>
            <option ${ing.unit=="stuks"?"selected":""}>stuks</option>
          </select>

          <select onchange="recipes[${i}].ings[${j}].type=this.value">
            <option value="pp" ${ing.type=="pp"?"selected":""}>pp</option>
            <option value="fixed" ${ing.type=="fixed"?"selected":""}>vast</option>
          </select>

          <span>${val}</span>

          <button class="danger" onclick="removeIng(${i},${j})">❌</button>

        </div>
        `;
      });

      html+=`
      <button onclick="addIng(${i})">+ ingrediënt</button>
      </div>
      `;
    });
  }

  if(tab==="list"){

    let list=getList();

    for(let k in list){
      html+=`<div class="card">${k}: ${list[k]}</div>`;
    }
  }

  if(tab==="overview"){

    let totaal=getTotalWeight();

    html+=`
      <div class="card big">
        📊 Totaal productie: ${totaal}
      </div>

      <div class="card">
        Aantal recepten: ${recipes.length}
      </div>
    `;
  }

  document.getElementById("app").innerHTML=html;

  document.getElementById("t1").className=tab==="recipes"?"active":"";
  document.getElementById("t2").className=tab==="list"?"active":"";
  document.getElementById("t3").className=tab==="overview"?"active":"";
}

render();

</script>

</body>
</html>
