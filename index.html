<!DOCTYPE html>
<html>
<body>

<h2>🍳 Keuken App</h2>

Personen:
<input type="number" id="people" value="4" onchange="update()">

<br><br>

<button onclick="add()">+ ingrediënt</button>

<div id="list"></div>

<script>

let data = [];

function add(){
  let name = prompt("Naam ingrediënt:");
  let per = Number(prompt("Hoeveel per persoon:"));
  let unit = prompt("Eenheid:");

  data.push({name, per, unit});
  update();
}

function update(){
  let p = document.getElementById("people").value;
  let html = "";

  data.forEach((d,i)=>{
    let totaal = d.per * p;

    html += `
      <div>
        ${d.name}: ${totaal} ${d.unit}
        <button onclick="remove(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function remove(i){
  data.splice(i,1);
  update();
}

</script>

</body>
</html>
