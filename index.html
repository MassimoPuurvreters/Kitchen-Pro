<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Keuken AI App</title>

<style>
body {margin:0;font-family:system-ui;background:#121212;color:white;}
header {padding:15px;text-align:center;background:#1e1e1e;font-weight:bold;}

.container {padding:15px;}

.card {
  background:#1f1f1f;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
}

.row {display:flex;gap:6px;margin-top:6px;}

input,textarea {
  flex:1;
  padding:8px;
  background:#333;
  border:none;
  border-radius:6px;
  color:white;
}

textarea {height:80px;}

button {
  padding:8px;
  border:none;
  border-radius:8px;
  background:#007aff;
  color:white;
}

.danger {background:#ff3b30;}

.cat {color:#aaa;margin-top:10px;}

.done {text-decoration:line-through;opacity:0.5;}

img {
  width:100%;
  border-radius:10px;
  margin-top:8px;
}
</style>
</head>

<body>

<header>🍳 Keuken AI Chef</header>

<div class="container">

<div class="card">
👥 Personen:
<input type="number" id="people" value="4" onchange="render()">
</div>

<div class="card">
<h3>🤖 AI Chef</h3>
<input id="chefInput" placeholder="kip pasta gezond">
<button onclick="chefRecipe()">Genereer recept</button>

<div id="chefOutput"></div>
</div>

<div class="card">
<h3>📥 Import</h3>
<textarea id="input" placeholder="2 ui&#10;kip 150 g"></textarea>
<button onclick="importRecipe()">Importeer</button>
</div>

<div class="card">
<button onclick="addRecipe()">+ Nieuw gerecht</button>
<div id="recipes"></div>
</div>

<div class="card">
<h3>🛒 Boodschappen</h3>
<div id="list"></div>
</div>

</div>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let checked = JSON.parse(localStorage.getItem("checked")||"{}");

/* SAVE */
function save(){
  localStorage.setItem("recipes", JSON.stringify(recipes));
  localStorage.setItem("checked", JSON.stringify(checked));
}

/* AI CHEF */
function chefRecipe(){

  let q = document.getElementById("chefInput").value.toLowerCase();
  if(!q) return;

  let items=[];
  let steps=[];
  let tips=[];

  if(q.includes("kip")){
    items.push({name:"kip",amount:150,unit:"g",cat:"vlees"});
    steps.push("Snijd kip");
    steps.push("Bak goudbruin");
  }

  if(q.includes("pasta")){
    items.push({name:"pasta",amount:100,unit:"g",cat:"overig"});
    steps.push("Kook pasta");
  }

  if(q.includes("rijst")){
    items.push({name:"rijst",amount:100,unit:"g",cat:"overig"});
    steps.push("Kook rijst");
  }

  if(q.includes("gezond")){
    items.push({name:"groente",amount:100,unit:"g",cat:"groente"});
    steps.push("Voeg groenten toe");
    tips.push("Gebruik weinig olie");
  }

  steps.push("Meng alles en serveer");

  let image = `https://source.unsplash.com/400x300/?${q},food`;

  let html = `
  ${image}
  <b>Ingrediënten:</b><br>
  ${items.map(i=>"- "+i.name).join("<br>")}
  <br><br>
  <b>Stappen:</b><br>
  ${steps.map((s,i)=> (i+1)+". "+s).join("<br>")}
  <br><br>
  <b>Tips:</b><br>
  ${tips.join("<br>") || "Geen"}
  <br><br>

  <button onclick='saveChef()'>✅ Voeg toe</button>
  `;

  window.tempRecipe = {name:q, items:image?items:items, image:image};

  document.getElementById("chefOutput").innerHTML = html;
}

/* SAVE AI RECEPT */
function saveChef(){

  recipes.push({
    name: "AI: "+window.tempRecipe.name,
    items: window.tempRecipe.items,
    image: window.tempRecipe.image
  });

  save();
  render();
}

/* IMPORT */
function importRecipe(){

  let text=document.getElementById("input").value;
  if(!text) return;

  let lines=text.split("\n");
  let items=[];

  lines.forEach(l=>{
    let parts=l.split(" ");
    if(parts.length>=2){
      items.push({
        name:parts[0],
        amount:Number(parts[1])||1,
        unit:parts[2]||"stuks",
        cat:"overig"
      });
    }
  });

  recipes.push({
    name:"Import",
    items,
    image:"https://source.unsplash.com/400x300/?food"
  });

  save(); render();
}

/* BASIC */
function addRecipe(){
  recipes.push({name:"Nieuw",items:[],image:"https://source.unsplash.com/400x300/?food"});
  save(); render();
}

function addItem(r){
  recipes[r].items.push({name:"",amount:0,unit:"g"});
  save(); render();
}

function removeItem(r,i){
  recipes[r].items.splice(i,1);
  save(); render();
}

function removeRecipe(r){
  recipes.splice(r,1);
  save(); render();
}

/* CALC */
function calc(a){
  return a * Number(document.getElementById("people").value||1);
}

/* LIST */
function buildList(){

  let out={};

  recipes.forEach(r=>{
    r.items.forEach(i=>{
      let key=i.name+"_"+i.unit;
      out[key]=(out[key]||0)+calc(i.amount);
    });
  });

  return out;
}

function toggle(k){
  checked[k]=!checked[k];
  save(); render();
}

/* RENDER */
function render(){

  let html="";

  recipes.forEach((r,i)=>{

    html+=`
    <div class="card">
      <input value="${r.name}" onchange="recipes[${i}].name=this.value;save()">
      <button class="danger" onclick="removeRecipe(${i})">🗑</button>

      ${r.image ? `${r.image}`:""}

      <button onclick="addItem(${i})">+ ingrediënt</button>
    `;

    r.items.forEach((it,j)=>{
      html+=`
      <div class="row">
        <input value="${it.name}" onchange="recipes[${i}].items[${j}].name=this.value;save()">
        <input type="number" value="${it.amount}" onchange="recipes[${i}].items[${j}].amount=Number(this.value);save()">
        <input value="${it.unit}" onchange="recipes[${i}].items[${j}].unit=this.value;save()">
        <span>${calc(it.amount)}</span>
        <button class="danger" onclick="removeItem(${i},${j})">❌</button>
      </div>
      `;
    });

    html+="</div>";
  });

  document.getElementById("recipes").innerHTML=html;

  let list=buildList();
  let lhtml="";

  for(let k in list){

    let done=checked[k]?"done":"";

    lhtml+=`
    <div class="${done}">
      <input type="checkbox" ${checked[k]?"checked":""} onclick="toggle('${k}')">
      ${k.replace("_"," ")}: ${list[k]}
    </div>
    `;
  }

  document.getElementById("list").innerHTML=lhtml;
}

render();

</script>

</body>
</html>
