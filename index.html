<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuken App</title>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont;
  background:#f2f3f7;
}

/* HEADER */
header {
  padding:15px;
  text-align:center;
  font-weight:600;
  background:white;
  border-bottom:1px solid #eee;
}

/* CONTENT */
.container {
  padding:15px;
  padding-bottom:90px;
}

/* CARD */
.card {
  background:white;
  border-radius:18px;
  padding:15px;
  margin-bottom:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

/* BUTTONS */
button {
  border:none;
  border-radius:12px;
  padding:8px 12px;
  background:#007aff;
  color:white;
  margin:3px;
}

button.danger {background:#ff3b30;}
button.small {font-size:11px;}

/* INPUTS */
input, textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:6px;
}

/* ROW */
.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:6px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #eee;
}

.nav button {
  background:none;
  color:#aaa;
  font-size:12px;
}

.active {
  color:#007aff;
  font-weight:bold;
}
</style>
</head>

<body>

<header>🍳 Keuken App</header>

<div class="container" id="content"></div>

<div class="nav">
  <button onclick="setTab('recipes')" id="t1">🍳</button>
  <button onclick="setTab('list')" id="t2">🛒</button>
  <button onclick="setTab('settings')" id="t3">⚙️</button>
</div>

<script>

let tab="recipes";
let people=4;
let recipes=JSON.parse(localStorage.getItem("recipes")||"[]");
let checked=JSON.parse(localStorage.getItem("checked")||"{}");

function save(){
  localStorage.setItem("recipes",JSON.stringify(recipes));
  localStorage.setItem("checked",JSON.stringify(checked));
}

function setTab(t){
  tab=t;
  render();
}

/* RECEPT */
function addRecipe(){
  let name=prompt("Naam recept:");
  if(!name) return;
  recipes.push({name,ings:[]});
  save(); render();
}

function importRecipe(){
  let name=prompt("Naam recept:");
  let text=prompt("Plak recept bijvoorbeeld:\nRijst 100 g");

  let lines=text.split("\\n");
  let ings=[];

  lines.forEach(l=>{
    let p=l.split(" ");
    if(p.length>=3){
      let n=p[0];
      let amt=Number(p[1]);
      let unit=p[2];
      if(!isNaN(amt)){
        ings.push({name:n, portion:amt, unit});
      }
    }
  });

  recipes.push({name,ings});
  save(); render();
}

function addIng(i){
  let n=prompt("Ingrediënt:");
  let amt=Number(prompt("Per persoon:"));
  let unit=prompt("Eenheid:");

  recipes[i].ings.push({name:n, portion:amt, unit});
