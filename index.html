<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuken App v2</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#111;
  color:white;
}

header {
  padding:15px;
  text-align:center;
  background:#1a1a1a;
}

.container {
  padding:15px;
}

.block {
  background:#1f1f1f;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
}

.row {
  display:flex;
  gap:5px;
  margin-top:6px;
}

input, select {
  flex:1;
  padding:6px;
  border-radius:6px;
  border:none;
  background:#333;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#007aff;
  color:white;
}

.del {
  background:#ff3b30;
}

.cat {
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
}
</style>
</head>

<body>

<header>🍳 Keuken App v2</header>

<div class="container">

<div class="block">
👥 Personen:
<input type="number" id="people" value="4" onchange="saveAndRender()">
</div>

<div id="main"></div>

<div class="block">
<h3>🛒 Boodschappenlijst</h3>
<div id="list"></div>
</div>

</div>

<script>

/* opslag */
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

/* opslaan */
function save(){
  localStorage.setItem("recipes", JSON.stringify(recipes));
}

function saveAndRender(){
  save();
  render();
}

/* nieuw recept */
function addRecipe(){
  recipes.push({name:"Nieuw gerecht", ings:[]});
  saveAndRender();
}

/* ingrediënt toevoegen */
function addIng(i){
  recipes[i].ings.push({
    name:"",
    amount:0,
    unit:"g",
    cat:"overig"
  });
  saveAndRender();
}

/* verwijderen */
function removeRecipe(i){
  recipes.splice(i,1);
  saveAndRender();
}

function removeIng(i,j){
  recipes[i].ings.splice(j,1);
  saveAndRender();
}

/* berekening */
function calc(a){
  let p = document.getElementById("people").value;
  return a * p;
}

/* lijst bouwen */
function buildList(){

  let out = {};

  recipes.forEach(r=>{
    r.ings.forEach(i=>{
      if(!i.name) return;

      if(!out[i.cat]) out[i.cat] = [];

      let val = calc(i.amount);

      out[i.cat].push({
        name: i.name,
        unit: i.unit,
        val: val
      });
    });
  });

  return out;
}

/* render */
function render(){

  let html = "";

  recipes.forEach((r,i)=>{

    html += `
    <div class="block">
      <div class="row">
        <input value="${r.name}" onchange="recipes[${i}].name=this.value;save()">
        <button class="del" onclick="removeRecipe(${i})">🗑</button>
      </div>
    `;

    r.ings.forEach((ing,j)=>{

      let totaal = calc(ing.amount);

      html += `
      <div class="row">
        <input placeholder="naam" value="${ing.name}" 
        onchange="recipes[${i}].ings[${j}].name=this.value;save()">

        <input type="number" value="${ing.amount}" 
        onchange="recipes[${i}].ings[${j}].amount=this.value;save()">

        <input value="${ing.unit}"
        onchange="recipes[${i}].ings[${j}].unit=this.value;save()">

        <select onchange="recipes[${i}].ings[${j}].cat=this.value;save()">
          <option ${ing.cat=="groente"?"selected":""}>groente</option>
          <option ${ing.cat=="vlees"?"selected":""}>vlees</option>
          <option ${ing.cat=="zuivel"?"selected":""}>zuivel</option>
          <option ${ing.cat=="overig"?"selected":""}>overig</option>
        </select>

        <span>${totaal}</span>

        <button class="del" onclick="removeIng(${i},${j})">❌</button>
      </div>
      `;
    });

    html += `
      <button onclick="addIng(${i})">+ ingrediënt</button>
    </div>
    `;
  });

  html += `<button onclick="addRecipe()">+ nieuw gerecht</button>`;

  document.getElementById("main").innerHTML = html;

  /* boodschappenlijst */
  let list = buildList();
  let listHTML = "";

  for(let cat in list){

    listHTML += `<div class="cat">📂 ${cat}</div>`;

    list[cat].forEach(i=>{
      listHTML += `<div>${i.name}: ${i.val} ${i.unit}</div>`;
    });

  }

  document.getElementById("list").innerHTML = listHTML;
}

render();

</script>

</body>
</html>
