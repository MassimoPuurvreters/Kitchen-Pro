<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuken App</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {padding:15px; background:white; font-weight:bold;}
.container {padding:10px;}
.card {background:white; padding:10px; margin-bottom:10px; border-radius:10px;}
button {padding:5px 8px; margin:2px;}
textarea {width:100%; height:100px;}
</style>
</head>

<body>

<header>🍳 Keuken App</header>

<div class="container">

  <div class="card">
    Personen:
    <input type="number" id="people" value="4" onchange="render()">
  </div>

  <div class="card">
    <b>Recept plakken</b><br>
    <textarea id="input" placeholder="Rijst 100 g\nKip 150 g"></textarea><br>
    <button onclick="importRecipe()">Importeer</button>
  </div>

  <div id="recipes"></div>

  <div class="card">
    <b>🛒 Boodschappenlijst</b>
    <div id="list"></div>
  </div>

</div>

<script>
let recipes = [];

function importRecipe(){
  let name = prompt("Naam recept:");
  let text = document.getElementById("input").value;

  let lines = text.split("\\n");
  let ings = [];

  lines.forEach(line=>{
    let parts = line.trim().split(" ");
    if(parts.length >= 3){
      let n = parts[0];
      let amt = Number(parts[1]);
      let unit = parts[2];

      if(!isNaN(amt)){
        ings.push({name:n, portion:amt, unit:unit});
      }
    }
  });

  recipes.push({name:name, ings:ings});
  render();
}

function addIngredient(i){
  let n = prompt("Naam:");
  let amt = Number(prompt("Per persoon:"));
  let unit = prompt("Eenheid:");

  recipes[i].ings.push({name:n, portion:amt, unit:unit});
  render();
}

function editIng(i,j){
  let ing = recipes[i].ings[j];
  let n = prompt("Naam:", ing.name);
  let amt = Number(prompt("Per persoon:", ing.portion));
  let unit = prompt("Eenheid:", ing.unit);

  recipes[i].ings[j] = {name:n, portion:amt, unit:unit};
  render();
}

function deleteIng(i,j){
  recipes[i].ings.splice(j,1);
  render();
}

function deleteRecipe(i){
  recipes.splice(i,1);
  render();
}

function getList(){
  let totals = {};
  let p = document.getElementById("people").value;

  recipes.forEach(r=>{
    r.ings.forEach(i=>{
      let key = i.name + " ("+i.unit+")";
      let val = Math.round(i.portion * p * 4)/4;
      totals[key] = (totals[key]||0) + val;
    });
  });

  return totals;
}

function render(){

  let p = document.getElementById("people").value;
  let html = "";

  recipes.forEach((r,i)=>{
    html += `<div class="card">
      <b>${r.name}</b>
      <button onclick="deleteRecipe(${i})">🗑</button><br>
      <button onclick="addIngredient(${i})">+ ingrediënt</button>
    `;

    r.ings.forEach((ing,j)=>{
      let val = Math.round(ing.portion * p * 4)/4;

      html += `
        <div>
          ${ing.name}: ${val} ${ing.unit}
          <button onclick="editIng(${i},${j})">✏️</button>
          <button onclick="deleteIng(${i},${j})">❌</button>
        </div>
      `;
    });

    html += "</div>";
  });

  document.getElementById("recipes").innerHTML = html;

  let list = getList();
  let listHTML = "";

  for(let k in list){
    listHTML += `<div>${k}: ${list[k]}</div>`;
  }

  document.getElementById("list").innerHTML = listHTML;
}

render();
</script>

</body>
</html>
