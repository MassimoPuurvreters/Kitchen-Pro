<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuken App Pro</title>

<style>
body { margin:0; font-family:system-ui; background:#f4f6f8; }
header { background:white; padding:15px; font-weight:bold; box-shadow:0 2px 5px rgba(0,0,0,0.05);}
.container { padding:15px; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:16px; box-shadow:0 4px 10px rgba(0,0,0,0.05);}
button { background:#007bff; color:white; border:none; border-radius:8px; padding:6px 10px; margin:2px; }
.danger { background:red; }
.row { display:flex; justify-content:space-between; align-items:center; }
.nav { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:white; border-top:1px solid #ddd; }
textarea { width:100%; height:120px; padding:8px; border-radius:8px; border:1px solid #ccc; }
input { padding:6px; border-radius:6px; border:1px solid #ccc; }
.active { color:#007bff; font-weight:bold; }
</style>
</head>

<body>

<header>🍳 Keuken App Pro</header>

<div class="container" id="content"></div>

<div class="nav">
  <button onclick="setTab('recipes')" id="tab1">Recepten</button>
  <button onclick="setTab('list')" id="tab2">Lijst</button>
</div>

<script>
let tab="recipes";
let people=4;
let recipes=JSON.parse(localStorage.getItem("recipes")||"[]");

function save(){ localStorage.setItem("recipes",JSON.stringify(recipes)); }
function setTab(t){ tab=t; render(); }

// 🔥 NIEUW: RECEPT INVOEREN VIA TEKST
function importRecipe(){
  let name=prompt("Naam recept:");
  let text=document.getElementById("importText").value;

  let lines=text.split("\\n");
  let ingredients=[];

  lines.forEach(line=>{
    let parts=line.split(" ");
    if(parts.length>=3){
      let name=parts[0];
      let amount=Number(parts[1]);
      let unit=parts[2];

      ingredients.push({
        name:name,
        portion:amount
        ,
        unit:unit
      });
    }
  });

  recipes.push({name,ings:ingredients,base:1,sel:true});
  save();
  render();
}

function deleteRecipe(i){
  if(confirm("Recept verwijderen?")){
    recipes.splice(i,1);
    save(); render();
  }
}

function editIng(i,j){
  let ing=recipes[i].ings[j];
  let name=prompt("Naam:",ing.name);
  let portion=Number(prompt("Per persoon:",ing.portion));
  let unit=prompt("Eenheid:",ing.unit);
  recipes[i].ings[j]={name,portion,unit};
  save(); render();
}

function removeIng(i,j){
  recipes[i].ings.splice(j,1);
  save(); render();
}

function shopping(){
  let totals={};
  recipes.forEach(r=>{
    if(!r.sel)return;
    r.ings.forEach(i=>{
      let key=i.name+" ("+i.unit+")";
      let val=Math.round(i.portion*people*4)/4;
      totals[key]=(totals[key]||0)+val;
    });
  });
  return totals;
}

function render(){
  let el=document.getElementById("content");
  el.innerHTML="";

  if(tab==="recipes"){
    el.innerHTML+=`
      <div class="card">
        👥 Personen:
        <input type="number" value="${people}" onchange="people=this.value;render()">
      </div>

      <div class="card">
        <h3>📥 Recept plakken</h3>
        <textarea id="importText" placeholder="Rijst 100 g\nKip 150 g\nSaus 50 ml"></textarea>
        <button onclick="importRecipe()">+ Importeren</button>
      </div>
    `;

    recipes.forEach((r,i)=>{
      el.innerHTML+=`
      <div class="card">
        <div class="row">
          <b>${r.name}</b>
          <div>
            <input type="checkbox" ${r.sel?"checked":""} onclick="recipes[${i}].sel=!recipes[${i}].sel;save();render()">
            <button class="danger" onclick="deleteRecipe(${i})">🗑</button>
          </div>
        </div>
      `;

      r.ings.forEach((ing,j)=>{
        let val=Math.round(ing.portion*people*4)/4;

        el.innerHTML+=`
        <div class="row">
          <span>${ing.name}: ${val} ${ing.unit}</span>
          <div>
            <button onclick="editIng(${i},${j})">✏️</button>
            <button class="danger" onclick="removeIng(${i},${j})">❌</button>
          </div>
        </div>
        `;
      });

      el.innerHTML+="</div>";
    });
  }

  if(tab==="list"){
    let list=shopping();
    for(let k in list){
      el.innerHTML+=`<div class="card">🛒 ${k}: ${list[k]}</div>`;
    }
  }

  document.getElementById("tab1").className=tab==="recipes"?"active":"";
  document.getElementById("tab2").className=tab==="list"?"active":"";
}

render();
</script>

</body>
</html>
