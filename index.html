<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Keuken App</title>

<style>

body {
  margin:0;
  font-family:system-ui;
  background:#181818;
  color:white;
}

header {
  padding:15px;
  text-align:center;
  background:#222;
  font-size:18px;
}

.card {
  background:#252525;
  margin:12px;
  padding:15px;
  border-radius:12px;
}

input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#333;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#007aff;
  color:white;
}

.danger {
  background:#ff3b30;
}

.title {
  font-size:18px;
  margin-bottom:8px;
}

/* COOK MODE */
#cook {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
}

#step {
  font-size:26px;
  text-align:center;
  margin-top:80px;
}

</style>

</head>
<body>

<header>🍳 Keuken App</header>

<div class="card">
<input id="input" placeholder="bijv: kip pasta gezond">
<button onclick="generate()">✨ AI recept</button>
</div>

<div id="preview" class="card"></div>

<div class="card">
<button onclick="saveRecipe()">✅ Opslaan</button>
</div>

<div id="recipes"></div>

<!-- KOOK MODUS -->
<div id="cook">
<div id="step"></div>

<div style="position:absolute;bottom:20px;width:100%;">
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
<button onclick="closeCook()">❌</button>
</div>
</div>

<script>

let recipes = [];
let temp = null;

let steps = [];
let index = 0;

/* ✅ AI GENERATOR */
function generate(){

  let q = document.getElementById("input").value.toLowerCase();

  if(!q){
    alert("Typ iets");
    return;
  }

  let items = [];
  let s = [];

  if(q.includes("kip")){
    items.push("150g kip");
    s.push("Snijd de kip in blokjes");
    s.push("Bak de kip goudbruin");
  }

  if(q.includes("pasta")){
    items.push("100g pasta");
    s.push("Kook de pasta");
  }

  if(q.includes("rijst")){
    items.push("100g rijst");
    s.push("Kook de rijst");
  }

  if(q.includes("gezond")){
    items.push("100g groenten");
    s.push("Voeg groenten toe");
  }

  if(items.length == 0){
    items.push("Ingrediënt naar keuze");
    s.push("Bereid naar smaak");
  }

  s.push("Meng alles en serveer");

  temp = {name:q, items:items, steps:s};

  document.getElementById("preview").innerHTML = `
    <div class="title">🍳 ${q}</div>

    <b>Ingrediënten</b><br>
    ${items.join("<br>")}

    <br><br>

    <b>Bereiding</b><br>
    ${s.map((x,i)=> (i+1)+". "+x).join("<br>")}
  `;
}

/* ✅ OPSLAAN */
function saveRecipe(){

  if(!temp){
    alert("Maak eerst een recept");
    return;
  }

  recipes.push(temp);
  render();
}

/* ✅ VERWIJDER */
function deleteRecipe(i){
  recipes.splice(i,1);
  render();
}

/* ✅ RENDER */
function render(){

  let html = "";

  recipes.forEach((r,i)=>{

    html += `
    <div class="card">

      <div class="title">${r.name}</div>

      <b>Ingrediënten</b><br>
      ${r.items.join("<br>")}

      <br><br>

      <b>Stappen</b><br>
      ${r.steps.map((x,j)=> (j+1)+". "+x).join("<br>")}

      <button onclick="cook(${i})">👨‍🍳 Start koken</button>

      <button class="danger" onclick="deleteRecipe(${i})">🗑 Verwijder</button>

    </div>
    `;
  });

  document.getElementById("recipes").innerHTML = html;
}

/* ✅ KOOK MODUS */
function cook(i){
  steps = recipes[i].steps;
  index = 0;
  document.getElementById("cook").style.display = "block";
  show();
}

function show(){
  document.getElementById("step").innerText =
    "Stap " + (index+1) + "\n\n" + steps[index];
}

function next(){
  if(index < steps.length-1){
    index++;
    show();
  }
}

function prev(){
  if(index > 0){
    index--;
    show();
  }
}

function closeCook(){
  document.getElementById("cook").style.display = "none";
}

</script>

</body>
</html>
