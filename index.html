
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuken App Pro</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#f4f6f8;
}

/* header */
header {
  padding:15px;
  background:white;
  font-weight:bold;
}

/* layout */
.container {
  padding:15px;
  padding-bottom:90px;
}

.card {
  background:white;
  padding:15px;
  border-radius:16px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* inputs */
input, select {
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
  margin:4px 0;
}

/* buttons */
button {
  padding:6px 10px;
  border:none;
  border-radius:10px;
  background:#007aff;
  color:white;
}

button.danger {background:#ff3b30}

/* row */
.row {
  display:flex;
  gap:5px;
  margin-top:5px;
}

/* nav */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  height:65px;
  background:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.active {color:#007aff; font-weight:bold;}
</style>
</head>

<body>

<header>🍳 Keuken App</header>

<div class="container" id="app"></div>

<div class="nav">
  <button onclick="tab='recipes';render()" id="t1">🍳</button>
  <button onclick="tab='list';render()" id="t2">🛒</button>
</div>

<script>

let tab="recipes";
let people=4;
let recipes=[];

/* toevoegen recept */
function addRecipe(){
  recipes.push({name:"Nieuw recept",ings:[]});
  render();
}

/* toevoegen ingrediënt */
function addIng(i){
  recipes[i].ings.push({
    name:"",
    amount:0,
    unit:"g",
    type:"pp" // pp = per persoon / fixed
  });
  render();
}

/* verwijderen */
function removeIng(i,j){
  recipes[i].ings.splice(j,1);
  render();
}

/* berekening */
function calc(ing){
  if(ing.type==="pp"){
    return ing.amount * people;
  } else {
    return ing.amount;
  }
}

/* lijst */
function getList(){
  let out={};

  recipes.forEach(r=>{
    r.ings.forEach(i=>{
      let key=i.name+" ("+i.unit+")";
      let val=calc(i);

      out[key]=(out[key]||0)+val;
    });
  });

  return out;
}

/* render */
function render(){

  let html="";

  if(tab==="recipes"){

    html+=`
    <div class="card">
      👥 Personen:
      <input type="number" value="${people}" onchange="people=this.value;render()">

      <button onclick="addRecipe()">+ Recept</button>
    </div>
    `;

    recipes.forEach((r,i)=>{

      html+=`
      <div class="card">
        <input value="${r.name}" onchange="recipes[${i}].name=this.value">
        <button class="danger" onclick="recipes.splice(${i},1);render()">🗑</button>
      `;

      r.ings.forEach((ing,j)=>{

        let val=calc(ing);

        html+=`
        <div class="row">
          <input placeholder="naam" value="${ing.name}" onchange="recipes[${i}].ings[${j}].name=this.value">
          <input type="number" value="${ing.amount}" onchange="recipes[${i}].ings[${j}].amount=this.value">
          
          <select onchange="recipes[${i}].ings[${j}].unit=this.value">
            <option ${ing.unit=="g"?"selected":""}>g</option>
            <option ${ing.unit=="ml"?"selected":""}>ml</option>
            <option ${ing.unit=="stuks"?"selected":""}>stuks</option>
          </select>

          <select onchange="recipes[${i}].ings[${j}].type=this.value">
            <option value="pp" ${ing.type=="pp"?"selected":""}>pp</option>
            <option value="fixed" ${ing.type=="fixed"?"selected":""}>vast</option>
          </select>

          <span>${val}</span>

          <button class="danger" onclick="removeIng(${i},${j})">❌</button>
        </div>
        `;
      });

      html+=`
      <button onclick="addIng(${i})">+ ingrediënt</button>
      </div>
      `;
    });

  }

  if(tab==="list"){

    let list=getList();

    for(let k in list){
      html+=`<div class="card">${k}: ${list[k]}</div>`;
    }

  }

  document.getElementById("app").innerHTML=html;

  document.getElementById("t1").className = tab==="recipes"?"active":"";
  document.getElementById("t2").className = tab==="list"?"active":"";
}

render();

</script>

</body>
</html>
