<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuken App v3</title>

<style>
body { font-family: Arial; background:#111; color:white; margin:0; }
header { padding:15px; background:#222; text-align:center; }

.block {
  padding:10px;
  margin:10px;
  background:#1f1f1f;
  border-radius:10px;
}

.row {
  display:flex;
  gap:5px;
  margin-top:5px;
}

input, select {
  padding:5px;
}

button {
  padding:5px 8px;
}

.del { background:red; color:white; }

.cat { color:#aaa; margin-top:10px; }

</style>
</head>

<body>

<header>🍳 KEUKEN APP v3</header>

<div class="block">
Personen:
<input type="number" id="people" value="4" onchange="saveAndRender()">
</div>

<div class="block">
<button onclick="addRecipe()">+ nieuw gerecht</button>
<div id="recipes"></div>
</div>

<div class="block">
<h3>BOODSCHAPPEN</h3>
<div id="list"></div>
</div>

<script>

/* ✅ DATA + STORAGE */
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

function save(){
  localStorage.setItem("recipes", JSON.stringify(recipes));
}

function saveAndRender(){
  save();
  render();
}

/* ✅ NIEUW RECEPT */
function addRecipe(){
  recipes.push({ name:"Nieuw gerecht", items:[] });
  saveAndRender();
}

/* ✅ NIEUW INGREDIENT */
function addItem(r){
  recipes[r].items.push({
    name:"",
    amount:0,
    unit:"g",
    cat:"overig"
  });
  saveAndRender();
}

/* ✅ DELETE */
function removeItem(r,i){
  recipes[r].items.splice(i,1);
  saveAndRender();
}

function removeRecipe(r){
  recipes.splice(r,1);
  saveAndRender();
}

/* ✅ CALC */
function calc(a){
  let p = Number(document.getElementById("people").value) || 0;
  return a * p;
}

/* ✅ LIJST MET CATEGORIE */
function buildList(){

  let out = {};

  recipes.forEach(r=>{
    r.items.forEach(i=>{
      if(!i.name) return;

      if(!out[i.cat]) out[i.cat] = {};

      let key = i.name + " ("+i.unit+")";
      let val = calc(Number(i.amount));

      out[i.cat][key] = (out[i.cat][key] || 0) + val;
    });
  });

  return out;
}

/* ✅ RENDER */
function render(){

  let html = "";

  recipes.forEach((rec,r)=>{

    html += `
    <div class="block">

      <div class="row">
        <input value="${rec.name}" 
        onchange="recipes[${r}].name=this.value;save()">

        <button class="del" onclick="removeRecipe(${r})">🗑</button>
      </div>

      <button onclick="addItem(${r})">+ ingrediënt</button>
    `;

    rec.items.forEach((item,i)=>{

      let total = calc(Number(item.amount));

      html += `
      <div class="row">

        <input placeholder="naam"
        value="${item.name}"
        onchange="recipes[${r}].items[${i}].name=this.value;save()">

        <input type="number"
        value="${item.amount}"
        onchange="recipes[${r}].items[${i}].amount=Number(this.value);save()">

        <input
        value="${item.unit}"
        onchange="recipes[${r}].items[${i}].unit=this.value;save()">

        <select onchange="recipes[${r}].items[${i}].cat=this.value;save()">
          <option ${item.cat=="groente"?"selected":""}>groente</option>
          <option ${item.cat=="vlees"?"selected":""}>vlees</option>
          <option ${item.cat=="zuivel"?"selected":""}>zuivel</option>
          <option ${item.cat=="overig"?"selected":""}>overig</option>
        </select>

        <span>${total}</span>

        <button class="del" onclick="removeItem(${r},${i})">❌</button>

      </div>
      `;
    });

    html += `</div>`;
  });

  document.getElementById("recipes").innerHTML = html;

  /* ✅ LIJST */
  let list = buildList();
  let listHTML = "";

  for(let cat in list){
    listHTML += `<div class="cat">📂 ${cat}</div>`;

    for(let k in list[cat]){
      listHTML += `<div>${k}: ${list[cat][k]}</div>`;
    }
  }

  document.getElementById("list").innerHTML = listHTML;
}

/* INIT */
render();

</script>

</body>
</html>
