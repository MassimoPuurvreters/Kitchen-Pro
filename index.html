👥 Personen:

</div>

<div class="block">
<h3>📥 Slim recept importeren</h3>
<textarea id="recipeInput" placeholder="2 ui&#10;kip 150g&#10;melk 200 ml"></textarea>
<button onclick="importTextRecipe()">Importeer</button>
</div>

<div class="block">
<button onclick="addRecipe()">+ nieuw gerecht</button>
<div id="recipes"></div>
</div>

<h3>🛒 Boodschappen</h3>

</div>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");
let checked = JSON.parse(localStorage.getItem("checked") || "{}");

/* SAVE */
function save(){
  localStorage.setItem("recipes", JSON.stringify(recipes));
  localStorage.setItem("checked", JSON.stringify(checked));
}
function saveAndRender(){ save(); render(); }

/* DOWNLOAD */
function downloadData(){
  let blob = new Blob([JSON.stringify({recipes, checked})]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "keuken.json";
  a.click();
}

/* UPLOAD */
function uploadData(e){
  let file = e.target.files[0];
  let reader = new FileReader();
  reader.onload = (evt)=>{
    let data = JSON.parse(evt.target.result);
    recipes = data.recipes||[];
    checked = data.checked||{};
    saveAndRender();
  };
  reader.readAsText(file);
}

/* RECEPT */
function addRecipe(){
  recipes.push({name:"Nieuw gerecht", items:[]});
  saveAndRender();
}
function removeRecipe(r){
  recipes.splice(r,1);
  saveAndRender();
}

/* INGREDIENT */
function addItem(r){
  recipes[r].items.push({name:"",amount:0,unit:"g",cat:"overig"});
  saveAndRender();
}
function removeItem(r,i){
  recipes[r].items.splice(i,1);
  saveAndRender();
}

/* CALC */
function calc(a){
  let p = Number(document.getElementById("people").value)||0;
  return a*p;
}

/* SMART UNIT */
function smartUnit(val,unit){
  if(unit=="g" && val>=1000) return (val/1000).toFixed(1)+" kg";
  if(unit=="ml" && val>=1000) return (val/1000).toFixed(1)+" l";
  return val+" "+unit;
}

/* ✅ SLIMME IMPORT */
function smartImport(text){

  let lines = text.split("\n");
  let items = [];

  lines.forEach(line => {

    line = line.trim().toLowerCase();
    if(!line) return;

    let name = "";
    let amount = 1;
    let unit = "stuks";

    // 🔥 haal getallen + eenheden eruit
    let match = line.match(/(\d+)\s*(g|kg|ml|l|stuks)?/);

    if(match){
      amount = Number(match[1]);
      if(match[2]) unit = match[2];
    }

    // 🔥 naam overhouden
    name = line
      .replace(/(\d+)\s*(g|kg|ml|l|stuks)?/, "")
      .trim();

    if(!name) name = "onbekend";

    // 🧠 categorie detectie (simpel maar robuust)
    let cat = "overig";

    if(/ui|tomaat|paprika|komkommer/.test(name)) cat = "groente";
    else if(/kip|rund|gehakt|vlees/.test(name)) cat = "vlees";
    else if(/melk|kaas|yoghurt|room/.test(name)) cat = "zuivel";

    items.push({
      name: name,
      amount: amount,
      unit: unit,
      cat: cat
    });

  });

  return items;
}

/* IMPORT */
function importTextRecipe(){
  let text=document.getElementById("recipeInput").value;
  if(!text) return;

  let name=prompt("Naam recept:");
  let items=smartImport(text);

  recipes.push({name, items});
  saveAndRender();
}

/* LIST */
function buildList(){
  let out={};

  recipes.forEach(r=>{
    r.items.forEach(i=>{
      if(!i.name) return;

      if(!out[i.cat]) out[i.cat]={};

      let key=i.name+"_"+i.unit;
      let val=calc(i.amount);

      out[i.cat][key]=(out[i.cat][key]||0)+val;
    });
  });

  return out;
}

/* CHECK */
function toggle(k){
  checked[k]=!checked[k];
  saveAndRender();
}

/* UI */

    html+=`

        onchange="recipes[${r}].name=this.value;save()">
